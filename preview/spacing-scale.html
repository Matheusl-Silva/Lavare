<!doctype html>
<!-- @dsCard group="Brand" name="Spacing scale" subtitle="Escala em múltiplos de 4px" viewport="700x280" -->
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-surface); }
  .row { display: grid; grid-template-columns: 60px 60px 1fr; align-items: center; gap: 12px; padding: 6px 0; }
  .token { font: 500 12px/1 var(--font-mono); color: var(--fg-default); }
  .px { font: 400 11px/1 var(--font-mono); color: var(--fg-muted); }
  .bar { height: 14px; background: var(--brand-500); border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><span class="token">space-1</span><span class="px">4 px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="token">space-2</span><span class="px">8 px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="token">space-3</span><span class="px">12 px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="token">space-4</span><span class="px">16 px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="token">space-5</span><span class="px">20 px</span><div class="bar" style="width:20px"></div></div>
  <div class="row"><span class="token">space-6</span><span class="px">24 px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="token">space-8</span><span class="px">32 px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="token">space-10</span><span class="px">40 px</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="token">space-12</span><span class="px">48 px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="token">space-16</span><span class="px">64 px</span><div class="bar" style="width:64px"></div></div>
</body>
</html>
