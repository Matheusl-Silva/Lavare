<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Brand color</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .sw { aspect-ratio: 1.4 / 1; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-between; padding: 8px 10px; box-sizing: border-box; font-family: var(--font-sans); }
  .sw.dark { color: rgba(255,255,255,.95); }
  .sw.light { color: var(--slate-800); }
  .sw .step { font-size: 11px; font-weight: 600; }
  .sw .hex { font-size: 10px; font-family: var(--font-mono); opacity: .85; }
  .title { font-size: 12px; font-weight: 600; color: var(--fg-primary); margin-bottom: 8px; letter-spacing: -.01em; }
  .sub { font-size: 11px; color: var(--fg-tertiary); margin-bottom: 14px; }
  .primary-badge { display: inline-block; font-size: 9px; padding: 2px 5px; border-radius: 3px; background: rgba(255,255,255,.25); margin-top: 2px; letter-spacing: .04em; text-transform: uppercase; font-weight: 600; }
</style></head><body>
  <div class="title">Sky — Cor primária da marca</div>
  <div class="sub">Remete a água, limpeza e confiança. Use sky-500 como anchor; sky-600 para hover de CTAs.</div>
  <div class="row">
    <div class="sw light" style="background:#F0F9FF"><span class="step">50</span><span class="hex">#F0F9FF</span></div>
    <div class="sw light" style="background:#E0F2FE"><span class="step">100</span><span class="hex">#E0F2FE</span></div>
    <div class="sw light" style="background:#BAE6FD"><span class="step">200</span><span class="hex">#BAE6FD</span></div>
    <div class="sw light" style="background:#7DD3FC"><span class="step">300</span><span class="hex">#7DD3FC</span></div>
    <div class="sw dark" style="background:#38BDF8"><span class="step">400</span><span class="hex">#38BDF8</span></div>
    <div class="sw dark" style="background:#0EA5E9"><span class="step">500<span class="primary-badge">Primary</span></span><span class="hex">#0EA5E9</span></div>
    <div class="sw dark" style="background:#0284C7"><span class="step">600</span><span class="hex">#0284C7</span></div>
    <div class="sw dark" style="background:#0369A1"><span class="step">700</span><span class="hex">#0369A1</span></div>
    <div class="sw dark" style="background:#075985"><span class="step">800</span><span class="hex">#075985</span></div>
    <div class="sw dark" style="background:#0C4A6E"><span class="step">900</span><span class="hex">#0C4A6E</span></div>
  </div>
</body></html>
