<!doctype html>
<!-- @dsCard group="Brand" name="Data table" subtitle="Linha de tabela densidade média, hover" viewport="700x220" -->
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Tabela</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .card { background: #fff; border: 1px solid var(--border-default); border-radius: 8px; box-shadow: var(--shadow-sm); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px 16px; font: 400 13px/1 var(--font-sans); color: var(--fg-default); border-bottom: 1px solid var(--border-subtle); }
  thead th { background: var(--slate-50); color: var(--fg-muted); font-weight: 600; font-size: 12px; letter-spacing: 0.02em; }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover { background: var(--slate-50); }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; text-align: right; }
  .pos { color: var(--success-700); font-weight: 500; }
  .neg { color: var(--danger-700); font-weight: 500; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font: 500 12px/1 var(--font-sans); padding: 3px 8px; border-radius: 999px; background: var(--slate-100); color: var(--slate-700); }
</style>
</head>
<body>
  <div class="card">
    <table>
      <thead>
        <tr><th>Data</th><th>Descrição</th><th>Forma de pagamento</th><th style="text-align:right">Valor</th></tr>
      </thead>
      <tbody>
        <tr><td class="num" style="text-align:left">14/05 14:32</td><td>Lavagem completa · ABC1D23</td><td><span class="badge">Pix</span></td><td class="num pos">+ R$ 120,00</td></tr>
        <tr><td class="num" style="text-align:left">14/05 13:15</td><td>Polimento · DEF2G34</td><td><span class="badge">Cartão</span></td><td class="num pos">+ R$ 280,00</td></tr>
        <tr><td class="num" style="text-align:left">14/05 11:48</td><td>Reposição shampoo</td><td><span class="badge">Dinheiro</span></td><td class="num neg">− R$ 180,00</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
