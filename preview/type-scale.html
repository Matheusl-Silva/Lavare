<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 8px 0; border-bottom: 1px solid var(--slate-100); }
  .row:last-child { border: 0; }
  .meta { font-size: 10px; font-family: var(--font-mono); color: var(--fg-tertiary); width: 110px; flex: none; }
  .sample { color: var(--fg-primary); }
  .t-4xl { font-size: 36px; font-weight: 600; letter-spacing: -.02em; line-height: 1.1; }
  .t-3xl { font-size: 30px; font-weight: 600; letter-spacing: -.02em; line-height: 1.15; }
  .t-2xl { font-size: 24px; font-weight: 600; letter-spacing: -.01em; line-height: 1.2; }
  .t-xl  { font-size: 20px; font-weight: 600; }
  .t-lg  { font-size: 16px; font-weight: 600; }
  .t-base{ font-size: 14px; font-weight: 400; color: var(--fg-secondary); }
  .t-sm  { font-size: 13px; font-weight: 400; color: var(--fg-secondary); }
</style></head><body>
  <div class="row"><span class="meta">4xl · 36/600</span><span class="sample t-4xl">R$ 24.890,00</span></div>
  <div class="row"><span class="meta">3xl · 30/600</span><span class="sample t-3xl">Movimentações do mês</span></div>
  <div class="row"><span class="meta">2xl · 24/600</span><span class="sample t-2xl">Estoque de itens</span></div>
  <div class="row"><span class="meta">xl · 20/600</span><span class="sample t-xl">Fila de carros</span></div>
  <div class="row"><span class="meta">lg · 16/600</span><span class="sample t-lg">Detalhes da lavagem</span></div>
  <div class="row"><span class="meta">base · 14/400</span><span class="sample t-base">Corpo de texto padrão usado em formulários, tabelas e descrições.</span></div>
  <div class="row"><span class="meta">sm · 13/400</span><span class="sample t-sm">Texto secundário em linhas de tabela e metadados.</span></div>
</body></html>
