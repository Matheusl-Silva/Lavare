<!doctype html>
<!-- @dsCard group="Brand" name="Brand palette · sky" subtitle="Cor primária — sky 50-900" viewport="700x170" -->
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Brand palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-surface); }
  .row { display: flex; gap: 8px; }
  .swatch { flex: 1; height: 84px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: space-between; padding: 10px 12px; border: 1px solid var(--border-default); }
  .swatch .step { font: 600 12px/1 var(--font-sans); letter-spacing: 0.04em; }
  .swatch .hex  { font: 500 11px/1 var(--font-mono); }
  .light .step, .light .hex { color: var(--slate-900); }
  .dark  .step, .dark  .hex { color: #fff; }
  h4 { font: 600 13px/1 var(--font-sans); letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-subtle); margin: 0 0 12px; }
</style>
</head>
<body>
  <h4>Brand · sky</h4>
  <div class="row">
    <div class="swatch light" style="background:#F0F9FF"><span class="step">50</span><span class="hex">#F0F9FF</span></div>
    <div class="swatch light" style="background:#E0F2FE"><span class="step">100</span><span class="hex">#E0F2FE</span></div>
    <div class="swatch light" style="background:#BAE6FD"><span class="step">200</span><span class="hex">#BAE6FD</span></div>
    <div class="swatch light" style="background:#7DD3FC"><span class="step">300</span><span class="hex">#7DD3FC</span></div>
    <div class="swatch light" style="background:#38BDF8"><span class="step">400</span><span class="hex">#38BDF8</span></div>
    <div class="swatch dark"  style="background:#0EA5E9;border-color:#0EA5E9"><span class="step">500</span><span class="hex">#0EA5E9</span></div>
    <div class="swatch dark"  style="background:#0284C7;border-color:#0284C7"><span class="step">600</span><span class="hex">#0284C7</span></div>
    <div class="swatch dark"  style="background:#0369A1;border-color:#0369A1"><span class="step">700</span><span class="hex">#0369A1</span></div>
    <div class="swatch dark"  style="background:#075985;border-color:#075985"><span class="step">800</span><span class="hex">#075985</span></div>
    <div class="swatch dark"  style="background:#0C4A6E;border-color:#0C4A6E"><span class="step">900</span><span class="hex">#0C4A6E</span></div>
  </div>
</body>
</html>
