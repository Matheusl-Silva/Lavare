<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="utf-8"><title>Inter</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #fff; font-family: var(--font-sans); color: var(--fg-primary); }
  .hero { font-size: 72px; line-height: 1; letter-spacing: -.04em; font-weight: 600; margin-bottom: 18px; }
  .meta { display: flex; gap: 24px; }
  .meta div { display: flex; flex-direction: column; gap: 2px; }
  .meta .lbl { font-size: 10px; color: var(--fg-tertiary); text-transform: uppercase; letter-spacing: .06em; }
  .meta .val { font-size: 13px; color: var(--fg-secondary); }
  .weights { display: flex; gap: 16px; margin-top: 14px; }
  .weights span { font-size: 22px; }
  .w4 { font-weight: 400; } .w5 { font-weight: 500; } .w6 { font-weight: 600; } .w7 { font-weight: 700; }
</style></head><body>
  <div class="hero">Inter</div>
  <div class="meta">
    <div><span class="lbl">Família</span><span class="val">Inter (Google Fonts)</span></div>
    <div><span class="lbl">Uso</span><span class="val">UI · títulos · body</span></div>
    <div><span class="lbl">Substituível por</span><span class="val">system-ui, sans-serif</span></div>
  </div>
  <div class="weights">
    <span class="w4">Aa 400</span>
    <span class="w5">Aa 500</span>
    <span class="w6">Aa 600</span>
    <span class="w7">Aa 700</span>
  </div>
</body></html>
