<!doctype html>
<!-- @dsCard group="Brand" name="Neutrals · slate" subtitle="Escala neutra slate 50-900" viewport="700x170" -->
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Neutral palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-surface); }
  .row { display: flex; gap: 8px; }
  .swatch { flex: 1; height: 84px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: space-between; padding: 10px 12px; border: 1px solid var(--border-default); }
  .swatch .step { font: 600 12px/1 var(--font-sans); letter-spacing: 0.04em; }
  .swatch .hex  { font: 500 11px/1 var(--font-mono); }
  .light .step, .light .hex { color: var(--slate-900); }
  .dark  .step, .dark  .hex { color: #fff; }
  h4 { font: 600 13px/1 var(--font-sans); letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-subtle); margin: 0 0 12px; }
</style>
</head>
<body>
  <h4>Neutrals · slate</h4>
  <div class="row">
    <div class="swatch light" style="background:#F8FAFC"><span class="step">50</span><span class="hex">#F8FAFC</span></div>
    <div class="swatch light" style="background:#F1F5F9"><span class="step">100</span><span class="hex">#F1F5F9</span></div>
    <div class="swatch light" style="background:#E2E8F0"><span class="step">200</span><span class="hex">#E2E8F0</span></div>
    <div class="swatch light" style="background:#CBD5E1"><span class="step">300</span><span class="hex">#CBD5E1</span></div>
    <div class="swatch light" style="background:#94A3B8"><span class="step">400</span><span class="hex">#94A3B8</span></div>
    <div class="swatch dark"  style="background:#64748B;border-color:#64748B"><span class="step">500</span><span class="hex">#64748B</span></div>
    <div class="swatch dark"  style="background:#475569;border-color:#475569"><span class="step">600</span><span class="hex">#475569</span></div>
    <div class="swatch dark"  style="background:#334155;border-color:#334155"><span class="step">700</span><span class="hex">#334155</span></div>
    <div class="swatch dark"  style="background:#1E293B;border-color:#1E293B"><span class="step">800</span><span class="hex">#1E293B</span></div>
    <div class="swatch dark"  style="background:#0F172A;border-color:#0F172A"><span class="step">900</span><span class="hex">#0F172A</span></div>
  </div>
</body>
</html>
