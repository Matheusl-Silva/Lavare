<!doctype html>
<!-- @dsCard group="Brand" name="Shadow / elevation" subtitle="xs (botões) · sm (cards) · md (popovers) · lg (modais)" viewport="700x170" -->
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Shadow elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px 24px; background: var(--bg-page); display: flex; gap: 20px; align-items: center; justify-content: space-around; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .card { width: 120px; height: 76px; background: #fff; border-radius: 8px; border: 1px solid var(--border-default); }
  .name { font: 600 12px/1 var(--font-sans); color: var(--fg-default); }
  .meta { font: 400 11px/1 var(--font-mono); color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="item">
    <div class="card" style="box-shadow:0 1px 2px rgba(15,23,42,0.04)"></div>
    <span class="name">xs</span><span class="meta">buttons</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:0 1px 3px rgba(15,23,42,0.06),0 1px 2px rgba(15,23,42,0.04)"></div>
    <span class="name">sm</span><span class="meta">cards</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:0 4px 12px rgba(15,23,42,0.08)"></div>
    <span class="name">md</span><span class="meta">dropdowns</span>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:0 12px 32px rgba(15,23,42,0.12)"></div>
    <span class="name">lg</span><span class="meta">modais</span>
  </div>
</body>
</html>
