<!doctype html>
<!-- @dsCard group="UI Kit — Configuracoes" name="UI kit · Configurações" subtitle="Tabs verticais · perfil, empresa, usuários, pagamentos, integrações" viewport="1280x720" -->
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Lavare · Configurações</title>
  <link rel="icon" href="../../assets/favicon.svg">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="../kit.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="AppShell.jsx"></script>
  <script type="text/babel" src="SettingsNav.jsx"></script>
  <script type="text/babel" src="SettingsSections.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    function ConfigApp() {
      const [active, setActive] = useState('perfil');
      useEffect(() => { lucide.createIcons(); }, [active]);
      const Section = SettingsSections[active];
      return (
        <AppShell active="configuracoes">
          <PageTitle title="Configurações" subtitle="Gerencie sua conta, equipe e preferências do sistema" />
          <div className="lv-settings-grid">
            <SettingsNav active={active} onChange={setActive} />
            <div className="lv-settings-content"><Section /></div>
          </div>
        </AppShell>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<ConfigApp />);
  </script>
</body>
</html>
