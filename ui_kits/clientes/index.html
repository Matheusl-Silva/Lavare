          { date: '14/04/2026', service: 'Lavagem completa', plate: 'RST6U78', price: 120, method: 'Pix' },
        ],
      },
    ];

    function ClientesApp() {
      const [filter, setFilter] = useState('Todos');
      const [query, setQuery] = useState('');
      const [open, setOpen] = useState(null);

      useEffect(() => { lucide.createIcons(); });

      const filtered = useMemo(() => {
        let r = CLIENTS;
        if (filter === 'VIP')     r = r.filter(c => c.tier === 'VIP');
        if (filter === 'Inativos') r = r.filter(c => {
          // last visit older than 60 days from "today" (2026-05-15)
          const [d, m, y] = c.lastVisit.split('/').map(Number);
          const dt = new Date(y, m - 1, d);
          return (new Date(2026, 4, 15) - dt) / (1000 * 60 * 60 * 24) > 60;
        });
        if (query.trim()) {
          const q = query.toLowerCase();
          r = r.filter(c =>
            c.name.toLowerCase().includes(q) ||
            c.phone.includes(q) ||
            c.plates.some(p => p.toLowerCase().includes(q))
          );
        }
        return r;
      }, [filter, query]);

      const kpis = [
        { label: 'Clientes cadastrados', value: CLIENTS.length.toString() },
        { label: 'Clientes VIP', value: CLIENTS.filter(c => c.tier === 'VIP').length.toString() },
        { label: 'Receita acumulada', value: 'R$ ' + CLIENTS.reduce((s, c) => s + c.totalSpent, 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) },
        { label: 'Ticket médio', value: 'R$ 142,80' },
      ];

      return (
        <AppShell active="clientes">
          <PageTitle title="Clientes" subtitle="Base de clientes e histórico de serviços">
            <button className="lv-btn lv-btn--secondary"><Icon name="download" size={16} /> Exportar</button>
            <button className="lv-btn lv-btn--primary"><Icon name="plus" size={16} stroke={2} /> Novo cliente</button>
          </PageTitle>

          <div className="lv-kpi-row">
            {kpis.map(k => (
              <div key={k.label} className="lv-kpi">
                <div className="lv-kpi__label">{k.label}</div>
                <div className="lv-kpi__value">{k.value}</div>
              </div>
            ))}
          </div>

          <ClientsTable rows={filtered} onOpen={setOpen} filter={filter} onFilter={setFilter} query={query} onQuery={setQuery} />

          <ClientDrawer open={!!open} client={open} onClose={() => setOpen(null)} />
        </AppShell>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ClientesApp />);
  </script>
</body>
</html>
